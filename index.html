<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tabungan Umroh</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#0F3D2E;
color:white;
padding:20px;
text-align:center;
}

.card{
background:white;
margin:15px;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.saldo{
font-size:28px;
font-weight:bold;
color:#0F3D2E;
}

.progress{
background:#eee;
height:10px;
border-radius:10px;
margin-top:10px;
}

.progress-bar{
background:#C8A45C;
height:10px;
border-radius:10px;
width:0%;
}

.transaksi{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.btn{
background:#0F3D2E;
color:white;
padding:12px;
border-radius:8px;
text-align:center;
margin-top:15px;
}

.loading{
height:20px;
background:#ddd;
margin:10px 0;
border-radius:6px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}
}

</style>
</head>

<body>

<div class="header">
<h2>Tabungan Umroh</h2>
<div id="nama">Loading...</div>
</div>

<div class="card">

<div>Saldo Tabungan</div>
<div class="saldo" id="saldo">...</div>

<div>Progress Pelunasan</div>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<div id="persen"></div>

</div>

<div class="card">

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>Riwayat Transaksi</h3>

<div id="transaksi">
<div class="loading"></div>
<div class="loading"></div>
<div class="loading"></div>
</div>

<div class="btn" onclick="downloadPDF()">
Download Buku Tabungan
</div>

</div>

<script>

const url = new URLSearchParams(window.location.search)

const user = url.get("user_id")
const va = url.get("no_va")

const API = "https://script.google.com/macros/s/AKfycbzk052mEIwZUHZLcjYcMmHqOPWcARXLS-XUE1hjUYhWP0_P61F6PKIn-HYG21fry0AD/exec"

fetch(API+"?user_id="+user+"&no_va="+va)

.then(res=>res.json())

.then(data=>{

document.getElementById("nama").innerHTML=data.nama

document.getElementById("saldo").innerHTML=
"Rp "+data.total.toLocaleString()

let persen = (data.total/data.target)*100

document.getElementById("progress").style.width=
persen+"%"

document.getElementById("persen").innerHTML=
Math.round(persen)+"% dari target"

let html=""

data.transaksi.forEach(t=>{

html+=`
<div class="transaksi">
<div>${t.tanggal}</div>
<div>Rp ${t.jumlah.toLocaleString()}</div>
</div>
`

})

document.getElementById("transaksi").innerHTML=html

buatChart(data.transaksi)

})

function buatChart(data){

let labels=[]
let values=[]

data.forEach(d=>{
labels.push(d.tanggal)
values.push(d.jumlah)
})

new Chart(document.getElementById("chart"),{
type:'line',
data:{
labels:labels,
datasets:[{
data:values,
borderColor:"#0F3D2E",
fill:false
}]
}
})

}

function downloadPDF(){

alert("Download PDF segera tersedia")

}

</script>

</body>
</html>
